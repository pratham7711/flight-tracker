<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle: deep navy sky -->
  <circle cx="16" cy="16" r="15" fill="#050810"/>
  <!-- Airplane silhouette, centered, pointing top-right -->
  <g transform="translate(16,16) rotate(-30)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="9" ry="2.2" fill="#38bdf8"/>
    <!-- Left wing -->
    <polygon points="-1,-2 -5,-9 3,-2" fill="#7dd3fc"/>
    <!-- Right wing -->
    <polygon points="-1,2 -5,9 3,2" fill="#7dd3fc"/>
    <!-- Tail fin top -->
    <polygon points="7,-1.5 4,-1.5 6,-4" fill="#0ea5e9"/>
    <!-- Tail fin bottom -->
    <polygon points="7,1.5 4,1.5 6,4" fill="#0ea5e9"/>
    <!-- Nose highlight -->
    <ellipse cx="7" cy="0" rx="2.5" ry="1.3" fill="#bae6fd"/>
  </g>
  <!-- Subtle flight trail dots -->
  <circle cx="5" cy="24" r="1" fill="#38bdf8" opacity="0.5"/>
  <circle cx="8" cy="26" r="0.8" fill="#38bdf8" opacity="0.3"/>
  <circle cx="11" cy="27.5" r="0.6" fill="#38bdf8" opacity="0.2"/>
</svg>
